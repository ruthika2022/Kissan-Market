<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add product</title>

  <!-- CSS -->
  <link rel="stylesheet" href="./add.css" />

  <!-- Font Awesome -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />

  <!-- Bootstrap Icons -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
  />
</head>

<body>
<header>
  <section class="logo">

    <!-- MENU ICON -->
    <div class="menu-icon" onclick="toggleMenu()">
      <i class="fa-solid fa-bars"></i>
    </div>

    <!-- LOGO -->
    <h2>KISAN MARKET</h2>

    <!-- LOCATION -->
    <div class="select-location" id="openPopup">
      Select Location <i class="fa-solid fa-chevron-down"></i>
    </div>

    <!-- SEARCH -->
    <div class="search">
      <input type="text" placeholder="Search products" />
      <button id="search-btn">Search</button>
    </div>

    <!-- NAV LINKS -->
    <nav class="child2">
      <ul class="content" id="navMenu">
        <li><a href="./farmer.html"><i class="fa-solid fa-house"></i> Home</a></li>
        <li><a href="./add.html"><i class="fa-solid fa-plus"></i> Add</a></li>
        <li><a href="./view-deal.html"><i class="fa-solid fa-handshake"></i> Deals</a></li>
        <li><a href="./newcontact.html"><i class="fa-solid fa-phone"></i> Contact</a></li>
        <li><a href="./farmer-profile.html"><i class="fa-solid fa-user"></i> Profile</a></li>

      </ul>
    </nav>

  </section>
</header>

<!-- LOCATION POPUP -->
<div class="overlay" id="locationPopup">
  <div class="location-popup">

    <div class="popup-header">
      <h3>Your Location</h3>
      <i class="fa-solid fa-xmark close"></i>
    </div>

    <div class="search-box">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="text" placeholder="Search a new address" />
    </div>

    <div class="current-location">
      <div class="location-left">
        <i class="fa-solid fa-location-crosshairs"></i>
        <div>
          <h4>Use My Current Location</h4>
          <p>Enable your location</p>
        </div>
      </div>
      <button class="enable-btn">Enable</button>
    </div>

    <div class="map-area">
      <i class="fa-solid fa-location-dot"></i>
    </div>

  </div>
</div>

<div class="container">
  <h2>Add New Product</h2>

  <form id="Product">
    <div class="form-grid">

      <div>
        <label>Product Name</label>
        <input type="text" placeholder="Enter Name" required />
      </div>

      <div>
        <label>Category</label>
        <select>
          <option>&lt;----Select The Type----&gt;</option>
          <option>Vegetables</option>
          <option>Fruits</option>
          <option>Spcies</option>
          <option>Cereals</option>
          <option>Pulses</option>
          <option>Oli Seeds</option>
          <option>Flowers</option>
          <option>Herbs</option>
          <option>Root & Tuber</option>
        </select>
      </div>

      <div>
        <label>price₹(per kg)</label>
        <input type="number" placeholder="price" required />
      </div>

      <div>
        <label>Quantity</label>
        <input type="number" required />
      </div>

    </div>

    <label>Description</label>
    <textarea></textarea>

    <label>Product Image</label>
    <input type="file" required />

    <button type="submit">Add Product</button>
  </form>
</div>

<script src="./add.js"></script>
</body>
</html>
