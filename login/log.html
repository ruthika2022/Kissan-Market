<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kisan Market - Login</title>

  <link rel="stylesheet" href="style.css" />

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<!-- HEADER -->
<header>
  <div class="navbar">
    <div class="menu-icon">
      <i class="fa-solid fa-bars"></i>
    </div>

    <h2>KISAN MARKET</h2>

    <div class="search">
      <input type="text" placeholder="Search products" />
      <button>Search</button>
    </div>

    <nav>
      <ul id="navMenu">
        <li><a href="../home/index.html"><i class="fa-solid fa-house"></i> Home</a></li>
        <li><a href="#"><i class="fa-solid fa-cart-shopping"></i> Cart</a></li>
        <li><a href="../chat/index.html"><i class="fa-solid fa-comments"></i> Chat</a></li>
        <li><a href="../contact/index.html"><i class="fa-solid fa-phone"></i> Contact</a></li>
        <li><a href="#"><button class="element">Log in</button></a></li>
      </ul>
    </nav>
  </div>
</header>

<!-- LOGIN -->
<div class="container">
  <div class="login-box">

    <div class="left">
      <h2>Welcome Back 👋</h2>
      <p>Login to connect farmers, vendors and buyers easily.</p>
    </div>

    <div class="right">
      <form onsubmit="event.preventDefault(); log();">
        
        <label>Email</label>
        <input type="email" id="email" required>

        <label>Password</label>
        <input type="password" id="password" required>

        <a href="#" class="forgot">Forgot Password?</a>
        <br><br>

        <button type="submit" class="log">Login</button>

        <p class="switch">
          Don't have an account? <a href="./reg.html">Register</a>
        </p>

      </form>
    </div>

  </div>
</div>

<script src="./script.js"></script>

</body>
</html>
